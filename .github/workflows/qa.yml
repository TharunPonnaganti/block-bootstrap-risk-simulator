name: QA Checks

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  qa:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install numpy matplotlib

      - name: Run engine QA invariant tests
        run: python qa_check.py

      - name: Run construction-lab QA (no SciPy -- exercises subgradient + graceful skip)
        run: python qa_construction.py

      - name: Install optional optimizer dependency (SciPy exact LP)
        run: pip install -r requirements-optim.txt

      - name: Run construction-lab QA again (SciPy present -- exercises exact Rockafellar-Uryasev LP)
        run: python qa_construction.py
